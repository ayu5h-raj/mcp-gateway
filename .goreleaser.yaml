version: 2

project_name: mcp-gateway

before:
  hooks:
    - go mod tidy

builds:
  - id: mcp-gateway
    main: ./cmd/mcp-gateway
    binary: mcp-gateway
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

  - id: mgw-smoke
    main: ./cmd/mgw-smoke
    binary: mgw-smoke
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: default
    ids:
      - mcp-gateway
      - mgw-smoke
    name_template: "mcp-gateway-{{ if eq .Os \"darwin\" }}macos{{ else }}{{ .Os }}{{ end }}-{{ if eq .Arch \"amd64\" }}intel{{ else }}{{ .Arch }}{{ end }}-v{{ .Version }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "mcp-gateway_v{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  github:
    owner: ayu5h-raj
    name: mcp-gateway
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  extra_files:
    - glob: ./scripts/install.sh
  header: |
    ## mcp-gateway v{{ .Version }}

    Local-first MCP aggregator — k9s for MCP.
  footer: |
    ## Install

    ```sh
    brew install ayu5h-raj/tap/mcp-gateway
    ```

    Or:
    ```sh
    curl -fsSL https://raw.githubusercontent.com/ayu5h-raj/mcp-gateway/main/scripts/install.sh | sh
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

brews:
  - name: mcp-gateway
    repository:
      owner: ayu5h-raj
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/ayu5h-raj/mcp-gateway
    description: Local-first MCP aggregator — k9s for MCP
    license: MIT
    install: |
      bin.install "mcp-gateway"
      bin.install "mgw-smoke"
    test: |
      assert_match "mcp-gateway", shell_output("#{bin}/mcp-gateway --version")
    caveats: |
      First-run wizard (run once):
        mcp-gateway init

      Useful commands:
        mcp-gateway tui              live ops dashboard
        mcp-gateway list             show servers + tool counts
        mcp-gateway service status   inspect the launchd auto-start service

      Uninstall — run in this order:
        mcp-gateway service uninstall    # tear down the launchd plist (idempotent)
        brew uninstall mcp-gateway
        rm -rf ~/.mcp-gateway            # optional: delete config + logs

      Skipping `service uninstall` first will leave a launchd plist on disk
      that respawns the now-missing binary on a loop until you remove
      ~/Library/LaunchAgents/com.ayu5h-raj.mcp-gateway.plist by hand.
