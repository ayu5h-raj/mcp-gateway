name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/mcp-gateway ./cmd/mcp-gateway
